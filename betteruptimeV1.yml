apiVersion: v1
kind: Namespace
metadata:
  name: betterstack
---
apiVersion: v1
kind: Secret
metadata:
  name: betterstack-secrets
  namespace: betterstack
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_WITH_DATABASE_URL"
  JWT_SECRET: "REPLACE_WITH_BACKEND_JWT_SECRET"
  NEXTAUTH_URL: "http://a24606d4123214fa996f222bd8488440-254637953.ap-south-1.elb.amazonaws.com"
  NEXTAUTH_SECRET: "REPLACE_WITH_NEXTAUTH_SECRET"
  GOOGLE_CLIENT_ID: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: betterstack-config
  namespace: betterstack
data:
  BACKEND_URL: "http://backend:3001"
  REDIS_URL: "redis://redis:6379"
  REGION_ID: "us-east"
  NODE_OPTIONS: "--dns-result-order=ipv4first"
  AUTH_TRUST_HOST: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: betterstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: betterstack
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: betterstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: adityavn03/betterstack1-backend:45f9843bfc254f305e2dee1b425d272b6ea2abf5
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: NODE_OPTIONS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: betterstack
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: betterstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: adityavn03/betterstack1-web:45f9843bfc254f305e2dee1b425d272b6ea2abf5
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: BACKEND_URL
            - name: AUTH_TRUST_HOST
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: AUTH_TRUST_HOST
            - name: NEXTAUTH_URL
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: NEXTAUTH_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: NEXTAUTH_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: GOOGLE_CLIENT_SECRET
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: betterstack
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pusher
  namespace: betterstack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pusher
  template:
    metadata:
      labels:
        app: pusher
    spec:
      containers:
        - name: pusher
          image: adityavn03/betterstack1-pusher:45f9843bfc254f305e2dee1b425d272b6ea2abf5
          imagePullPolicy: Always
          env:
            - name: NODE_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: NODE_OPTIONS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: DATABASE_URL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: betterstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: adityavn03/betterstack1-worker:45f9843bfc254f305e2dee1b425d272b6ea2abf5
          imagePullPolicy: Always
          env:
            - name: NODE_OPTIONS
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: NODE_OPTIONS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: REDIS_URL
            - name: REGION_ID
              valueFrom:
                configMapKeyRef:
                  name: betterstack-config
                  key: REGION_ID
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: betterstack-secrets
                  key: DATABASE_URL
